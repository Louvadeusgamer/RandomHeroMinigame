<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root {
            --off-color: #800000;
            --openqueue-color: #ff70ff;
            --tank-color: #70ff70;
            --damage-color: #70ffff;
            --support-color: #ff7070;
        }

        th, td {
            border: 1px solid;
            padding: 7px;
            border-radius: 15px;
        }
        table {
            margin: 10px 0;
        }
        select {
            border: none;
            outline: none;
            background-color: #0000;
            height: 75px;
        }
        input {
            border-width: 0 0 1px 0;
            border-radius: 0 0 15px 15px;
            outline: none;
            padding: 5px;
            background-color: #0000;
        }
        select:disabled {
            color: black;
        }

        button#start {
            padding: 10px;
            border: none;
            background-color: #00dd00;
            border-radius: 25px;
        }
        button#start:disabled {
            display: none;
        }
        button#finishround {
            padding: 10px;
            border: none;
            background-color: yellowgreen;
            border-radius: 25px 0 0 25px;
        }
        button#finishround:disabled {
            margin: 0 -6px;
            padding: 10px;
            border: none;
            background-color: gray;
            border-radius: 25px 0 0 25px;
        }
        button#nextround {
            margin: 0 -6px;
            padding: 10px;
            border: none;
            background-color: greenyellow;
            border-radius: 0 25px 25px 0;
        }
        button#nextround:disabled {
            margin: 0 -6px;
            padding: 10px;
            border: none;
            background-color: gray;
            border-radius: 0 25px 25px 0;
        }
        button#clean {
            padding: 10px;
            border: none;
            background-color: red;
            border-radius: 25px 0 0 25px;
        }
        button#uncheckpotg {
            margin: 0 -6px;
            padding: 10px;
            border: none;
            background-color: red;
            border-radius: 0 25px 25px 0;
        }

        .principal {
            color: gold;
            font-weight: bold;
        }

        input[name="potg"] {
            transform: scale(2);
        }
        
        .off {
            background-color: var(--off-color);
        }
        .open-queue {
            background-color: var(--openqueue-color);
        }
        .tank {
            background-color: var(--tank-color);
        }
        .damage {
            background-color: var(--damage-color);
        }
        .support {
            background-color: var(--support-color);
        }
    </style>
</head>
